# ─────────────────────────────────────────────────────────────────────────────
# Cognitive Mesh Lab — Pull Request Build Check
# ─────────────────────────────────────────────────────────────────────────────
# Runs on every pull request to verify the build succeeds before merging.
# Does NOT deploy — just checks the code compiles cleanly.
# ─────────────────────────────────────────────────────────────────────────────

name: 🔍 Build Check (PR)

on:
  pull_request:
    branches:
      - main

jobs:
  build-check:
    name: Verify build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: ✅ Build passed
        run: echo "Build succeeded — safe to merge"
